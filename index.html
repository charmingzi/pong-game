<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>双人联机乒乓球</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #000; border: 2px solid #fff; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let player = 1;
let gameData = {
  paddle1: { y: 250 },
  paddle2: { y: 250 },
  ball: { x: 400, y: 300, vx: 4, vy: 2 },
  score1: 0, score2: 0
};

document.addEventListener('keydown', (e) => {
  let y = player === 1 ? gameData.paddle1.y : gameData.paddle2.y;
  if (player === 1) {
    if (e.key === 'w') y -= 15;
    if (e.key === 's') y += 15;
  } else {
    if (e.key === 'ArrowUp') y -= 15;
    if (e.key === 'ArrowDown') y += 15;
  }
  fetch('/move', {
    method: 'POST',
    body: JSON.stringify({ player, y })
  });
});

function draw() {
  ctx.clearRect(0,0,800,600);
  ctx.fillStyle = '#fff';
  ctx.fillRect(30, gameData.paddle1.y, 10, 100);
  ctx.fillRect(760, gameData.paddle2.y, 10, 100);
  ctx.beginPath();
  ctx.arc(gameData.ball.x, gameData.ball.y, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.font = '40px Arial';
  ctx.fillText(gameData.score1, 200, 50);
  ctx.fillText(gameData.score2, 600, 50);
}

setInterval(async () => {
  let res = await fetch('/game');
  gameData = await res.json();
  draw();
}, 30);
</script>
</body>
</html>
