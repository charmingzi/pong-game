<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>双人联机乒乓球</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #000; border: 2px solid #fff; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  
  // 自动适配部署地址
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(protocol + '//' + window.location.host);

  let player = 1;
  let gameData = {};

  document.addEventListener('keydown', (e) => {
    if (!gameData.paddle1) return;
    let y = player === 1 ? gameData.paddle1.y : gameData.paddle2.y;
    
    if (player === 1) {
      if (e.key === 'w') y -= 15;
      if (e.key === 's') y += 15;
    } else {
      if (e.key === 'ArrowUp') y -= 15;
      if (e.key === 'ArrowDown') y += 15;
    }
    
    ws.send(JSON.stringify({ type: 'move', player, y }));
  });

  ws.onmessage = (e) => {
    gameData = JSON.parse(e.data);
    draw();
  };

  function draw() {
    if (!gameData.paddle1) return;
    ctx.clearRect(0, 0, 800, 600);
    
    ctx.fillStyle = '#fff';
    ctx.fillRect(30, gameData.paddle1.y, 10, 100);
    ctx.fillRect(760, gameData.paddle2.y, 10, 100);
    
    ctx.beginPath();
    ctx.arc(gameData.ball.x, gameData.ball.y, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '40px Arial';
    ctx.fillText(gameData.score1, 200, 50);
    ctx.fillText(gameData.score2, 600, 50);
  }
</script>
</body>
</html>
